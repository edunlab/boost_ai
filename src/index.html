<!DOCTYPE html>

<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>[에듀니티랩] Antigravity 기반 AI 워크플로우 설계와 에이전트 구축</title>
  <link href="style.css" rel="stylesheet" />
</head>

<body>
  <!-- Flash Screen layer for Timer Visual Alert -->
  <div class="flash-screen" id="flash-screen"></div>
  <!-- Drawing Indicator Overlay -->
  <div class="drawing-indicator" id="drawing-indicator">그리기 모드 활성화 중 (P로 해제)</div>
  <div class="app-container">
    <!-- Top Header -->
    <header>
      <div class="logo-container">
        <div class="logo-icon">A</div>
        <div class="logo-text">Edunity<span>Lab</span> Presentation</div>
      </div>
      <div class="nav-controls">
        <button class="view-toggle-btn print-pdf-btn" id="print-pdf" title="PDF 저장/인쇄">
          <svg style="width:16px;height:16px;fill:currentColor" viewbox="0 0 24 24">
            <path
              d="M19,8H5C3.34,8 2,9.34 2,11V17H6V21H18V17H22V11C22,9.34 20.66,8 19,8M16,19H8V15H16V19M19,12C18.45,12 18,11.55 18,11C18,10.45 18.45,10 19,10C19.55,10 20,10.45 20,11C20,11.55 19.55,12 19,12M18,3H6V7H18V3Z">
            </path>
          </svg>
          PDF 저장/인쇄
        </button>
        <button class="view-toggle-btn" id="toggle-view">
          <svg style="width:16px;height:16px;fill:currentColor" viewbox="0 0 24 24">
            <path d="M4,4H20V12H4V4M4,14H11V20H4V14M13,14H20V20H13V14Z"></path>
          </svg>
          대시보드 <span class="badge">Esc</span>
        </button>
        <button class="presenter-tools-toggle" id="toggle-tools" title="발표자 도구 열기 (T)">
          <svg style="width:20px;height:20px;fill:currentColor" viewbox="0 0 24 24">
            <path
              d="M12,15.5A2.5,2.5 0 0,1 9.5,13A2.5,2.5 0 0,1 12,10.5A2.5,2.5 0 0,1 14.5,13A2.5,2.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.47,5.34 14.86,5.08L14.48,2.42C14.44,2.18 14.24,2 14,2H10C9.76,2 9.56,2.18 9.52,2.42L9.14,5.08C8.53,5.34 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.95C7.96,18.34 8.53,18.66 9.14,18.92L9.14,21.58C9.18,21.82 9.38,22 9.62,22H13.62C13.86,22 14.06,21.82 14.1,21.58L14.48,18.92C15.09,18.66 15.66,18.34 16.18,17.95L18.67,18.95C18.89,19.03 19.16,18.95 19.28,18.73L21.28,15.27C21.4,15.05 21.35,14.78 21.16,14.63L19.43,12.97Z">
            </path>
          </svg>
        </button>
      </div>
    </header>
    <!-- Side Presenter Drawer -->
    <div class="presenter-tools-drawer" id="tools-drawer">
      <div>
        <div class="drawer-section-title">연습용 타이머</div>
        <div class="timer-container">
          <div class="timer-display">10:00</div>
          <div class="timer-controls-row">
            <button class="timer-btn active-play" id="timer-start">타이머 시작</button>
            <button class="timer-btn" id="timer-reset">리셋</button>
          </div>
          <div class="timer-presets">
            <button class="preset-btn" data-mins="3">3분</button>
            <button class="preset-btn" data-mins="5">5분</button>
            <button class="preset-btn" data-mins="10">10분</button>
            <button class="preset-btn" data-mins="20">20분</button>
          </div>
        </div>
      </div>
      <div>
        <div class="drawer-section-title">그리기 도구</div>
        <button class="tool-action-btn" id="toggle-drawing">
          <svg viewbox="0 0 24 24">
            <path
              d="M14.06,9L15,9.94L5.92,19H5V18.08L14.06,9M17.66,3C17.41,3 17.15,3.1 16.96,3.29L15.13,5.12L18.88,8.87L20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18.17,3.09 17.92,3 17.66,3M14.06,6.19L3,17.25V21H6.75L17.81,9.94L14.06,6.19Z">
            </path>
          </svg>
          <span class="btn-text">포인터 펜 켜기 (P)</span>
        </button>
        <button class="tool-action-btn" id="clear-drawing">
          <svg viewbox="0 0 24 24">
            <path
              d="M19.36,2.72L20.78,4.14L15.06,9.86L16.48,11.28L11.12,16.64L9.7,15.22L5.86,19.06L4.44,17.64L8.28,13.8L6.86,12.38L12.22,7.02L13.64,8.44L19.36,2.72M3,21H21V23H3V21Z">
            </path>
          </svg>
          <span>판서 전체 지우기</span>
        </button>
      </div>
      <div>
        <div class="drawer-section-title">화면 모드</div>
        <button class="tool-action-btn" id="toggle-theme">
          <svg viewbox="0 0 24 24">
            <path
              d="M12,18C11.11,18 10.26,17.8 9.5,17.45C11.56,16.5 13,14.42 13,12C13,9.58 11.56,7.5 9.5,6.55C10.26,6.2 11.11,6 12,6A6,6 0 0,1 18,12A6,6 0 0,1 12,18M20,8.69V4H15.31L12,0.69L8.69,4H4V8.69L0.69,12L4,15.31V20H8.69L12,23.31L15.31,20H20V15.31L23.31,12L20,8.69Z">
            </path>
          </svg>
          <span class="btn-text">발표용 라이트 모드</span>
        </button>
      </div>
      <div>
        <div class="drawer-section-title">단축키 정보</div>
        <div class="cheat-sheet-grid">
          <div class="cheat-item"><span class="cheat-label">다음 슬라이드</span><span class="badge">→ / Space</span></div>
          <div class="cheat-item"><span class="cheat-label">이전 슬라이드</span><span class="badge">←</span></div>
          <div class="cheat-item"><span class="cheat-label">대시보드 전환</span><span class="badge">Esc / Ctrl+D</span></div>
          <div class="cheat-item"><span class="cheat-label">포인터 펜 켜기</span><span class="badge">P</span></div>
          <div class="cheat-item"><span class="cheat-label">발표자 도구</span><span class="badge">T</span></div>
        </div>
      </div>
    </div>
    <!-- Main Viewport Area -->
    <main class="main-viewport">
      <!-- Slide Deck Presentation Mode -->
      <div class="slides-wrapper">
        <!-- Virtual Drawing Pen Layer -->
        <canvas class="drawing-canvas-layer" id="drawing-canvas"></canvas>
      </div>
      <!-- Dashboard Grid View (Shown via dashboard mode) -->
      <div class="dashboard-viewport">
        <div class="dashboard-header">
          <div class="dashboard-title-area">
            <h2>에듀니티랩 실습교육 커리큘럼 대시보드</h2>
            <p>원하는 차시의 카드형 요약본을 클릭하여 슬라이드로 이동할 수 있습니다.</p>
          </div>
          <div class="search-filter-box">
            <svg class="search-icon" viewbox="0 0 24 24">
              <path
                d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"
                fill="currentColor"></path>
            </svg>
            <input id="search-slides" placeholder="슬라이드 검색 (주제, 키워드)..." type="text" />
          </div>
        </div>
        <!-- Cards Grid Container (Rendered dynamically) -->
        <div class="cards-grid"></div>
      </div>
      <!-- Fixed Presentation Navigation Controls -->
      <div class="navigation-bar">
        <button class="nav-btn" id="prev-btn" title="이전 슬라이드 (←)">
          <svg viewbox="0 0 24 24">
            <path d="M15.41,16.58L10.83,12L15.41,7.41L14,6L8,12L14,18L15.41,16.58Z"></path>
          </svg>
        </button>
        <div class="progress-track">
          <div class="progress-bar"></div>
        </div>
        <div class="slide-progress-info">1 / 16</div>
        <button class="nav-btn" id="next-btn" title="다음 슬라이드 (→ / Space)">
          <svg viewbox="0 0 24 24">
            <path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"></path>
          </svg>
        </button>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>

</html>
